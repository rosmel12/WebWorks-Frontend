<div class="conteiner"  autocomplete="off"  >
    <form [formGroup]="registrarForm" autocomplete="off" class="form-container">
        <H1>Registrarse</H1>
        <mat-form-field class="example-full-width">
          <mat-label>Name</mat-label>
          <input  matInput 
          placeholder="Ex name" 
          formControlName="name"
          required>
        </mat-form-field>
      
        <mat-form-field class="example-full-width">
            <mat-label>LastName</mat-label>
            <input matInput 
            placeholder="Ex. lastName " 
            formControlName="lastName"
            required>
        </mat-form-field>

        <mat-form-field class="example-full-width">
            <mat-label>Phone</mat-label>
            <input matInput 
            type="number"
            placeholder="Ex ########" 
            formControlName="phone"
            required>
        </mat-form-field>
        <mat-form-field class="example-full-width">
            <mat-label>Email</mat-label>
            <input matInput 
            type="email"
            placeholder="Ex email" 
            formControlName="email"
            required>
        </mat-form-field>

        <mat-form-field class="example-full-width">
            <mat-label>Nickname</mat-label>
            <input matInput 
            placeholder="Ex nikcname" 
            formControlName="username"
            required>
        </mat-form-field>
    
        <mat-form-field class="example-full-width">
            <mat-label>Password</mat-label>
            <input matInput 
            type="password"
            placeholder="Ex password" 
            formControlName="password"
            required>
        </mat-form-field>
        <button class="button" (click)="registrar()" color="primary">Registrarse</button>
    
    </form>
</div>
